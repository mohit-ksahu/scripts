<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sand</title>
  <style>
    :root {
      color-scheme: light;
      --background: oklch(1.000 0.000 0.000);
      --foreground: oklch(0.200 0.004 286.099);
      --card: oklch(1.000 0.000 0.000);
      --card-foreground: oklch(0.200 0.004 286.099);
      --primary: oklch(0.200 0.004 286.099);
      --primary-foreground: oklch(0.985 0.002 286.350);
      --secondary: oklch(0.900 0.003 286.350);
      --secondary-foreground: oklch(0.200 0.004 286.099);
      --muted-foreground: oklch(0.550 0.004 286.099);
      --border: oklch(0.850 0.003 286.350);
      --input: oklch(0.850 0.003 286.350);
      --ring: oklch(0.522 0.177 255.830);
      --radius: 0;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        color-scheme: dark;
        --background: oklch(0.165 0.004 286.099);
        --foreground: oklch(0.971 0.003 286.350);
        --card: oklch(0.165 0.004 286.099);
        --card-foreground: oklch(0.971 0.003 286.350);
        --primary: oklch(0.971 0.003 286.350);
        --primary-foreground: oklch(0.165 0.004 286.099);
        --secondary: oklch(0.280 0.004 286.099);
        --secondary-foreground: oklch(0.971 0.003 286.350);
        --muted-foreground: oklch(0.680 0.004 286.099);
        --border: oklch(0.280 0.004 286.099);
        --input: oklch(0.280 0.004 286.099);
        --ring: oklch(0.522 0.177 255.830);
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100vh;
      overflow: hidden;
    }

    body {
      background-color: var(--background);
      color: var(--foreground);
      font-family: "Geist", "Inter", sans-serif;
      line-height: 1.5;
    }

    .container {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      flex-shrink: 0;
      background-color: var(--card);
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.2;
    }

    .workspace {
      display: flex;
      padding: 0;
      gap: 0;
      flex: 1;
      min-height: 0;
      background: var(--background);
    }

    .preview-box {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--card);
      border-right: 1px solid var(--border);
      padding: 12px;
    }

    .preview-box svg, .preview-box canvas {
      display: block;
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
    }

    .sidebar {
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 0;
      overflow-y: auto;
    }

    details {
      border-bottom: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
    }

    summary {
      display: flex;
      justify-content: space-between;
      padding: 6px 10px;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      outline: none;
    }

    summary::after {
      content: "▼";
      font-size: 0.65rem;
      color: var(--muted-foreground);
    }

    details[open] summary::after {
      content: "▲";
    }

    details[open] summary {
      border-bottom: 1px solid var(--border);
    }

    .accordion-body {
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #code-output {
      width: 100%;
      height: auto;
      font-family: monospace;
      font-size: 0.75rem;
      resize: none;
      background: var(--background);
      border: none;
      border-top: 1px solid var(--border);
      color: var(--foreground);
      padding: 10px;
      outline: none;
      overflow-y: hidden;
      display: block;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted-foreground);
    }

    input[type="text"],
    input[type="number"],
    input[type="color"],
    select {
      width: 100%;
      padding: 4px 8px;
      border: 1px solid var(--input);
      border-radius: var(--radius);
      background: transparent;
      color: inherit;
      font-size: 0.8rem;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--ring);
    }

    input[type="color"] {
      height: 26px;
      padding: 0;
      cursor: pointer;
    }

    #bg-color-input {
      flex: 1;
    }

    .row-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn {
      background: var(--primary);
      color: var(--primary-foreground);
      border: none;
      border-radius: var(--radius);
      padding: 6px 12px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.8rem;
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: opacity 0.15s ease;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn-secondary {
      background: var(--secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--secondary-foreground);
    }

    .btn-secondary:hover {
      opacity: 0.8;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: auto;
      background: var(--card);
      padding: 12px;
      border-top: 1px solid var(--border);
      border-radius: var(--radius);
      position: sticky;
      bottom: 0;
      z-index: 10;
    }

    .actions button {
      flex: 1;
    }

    @media (max-width: 900px) {
      .workspace {
        flex-direction: column;
        overflow-y: auto;
      }
      .sidebar {
        width: 100%;
        overflow-y: visible;
      }
      .preview-box {
        height: 350px;
        flex: none;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Sand</h1>
    </header>
    <main class="workspace">
      <div class="preview-box" id="preview-box"></div>

      <div class="sidebar">
        <details open>
          <summary>Settings</summary>
          <div class="accordion-body">
            <div class="form-group">
              <label for="seed-input">Seed</label>
              <div class="row-group">
                <input type="text" id="seed-input" placeholder="Enter seed string...">
                <button id="btn-rand" class="btn btn-secondary">Random</button>
              </div>
            </div>

            <div class="form-group">
              <label for="width-input">Width (px)</label>
              <input type="number" id="width-input" placeholder="e.g. 10" value="10">
            </div>

            <div class="form-group">
              <label for="height-input">Height (px)</label>
              <input type="number" id="height-input" placeholder="e.g. 10" value="10">
            </div>

            <div class="form-group">
              <label for="colors-input">Colors Count</label>
              <input type="number" id="colors-input" placeholder="e.g. 2" value="2">
            </div>

            <div class="form-group">
              <label for="padding-input">Padding (px)</label>
              <input type="number" id="padding-input" placeholder="e.g. 1" value="1">
            </div>

            <div class="form-group">
              <label for="density-input">Fill Density (%)</label>
              <input type="number" id="density-input" placeholder="e.g. 75" value="75">
            </div>

            <div class="form-group">
              <label for="symmetry-select">Symmetry Mode</label>
              <select id="symmetry-select">
                <option value="raw" selected>Raw (No symmetry)</option>
                <option value="horizontal">Horizontal</option>
                <option value="vertical">Vertical</option>
              </select>
            </div>

            <div class="form-group">
              <label for="bg-color-input">Background Color</label>
              <div class="row-group">
                <input type="checkbox" id="bg-enabled" checked>
                <input type="color" id="bg-color-input" value="#ffffff">
              </div>
            </div>
          </div>
        </details>

        <details>
          <summary>Code</summary>
          <textarea id="code-output" readonly></textarea>
        </details>

        <div class="actions">
          <button id="btn-svg" class="btn btn-secondary">SVG</button>
          <button id="btn-png" class="btn btn-secondary">PNG</button>
          <button id="btn-dataurl" class="btn">Data URL</button>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
